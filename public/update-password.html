<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Choose New Password | Dag</title>
<link href="assets/styles.css" rel="stylesheet"/>
<link href="assets/auth.css" rel="stylesheet"/>
</head>
<body>
<div data-site-header=""></div>
<main>
<div class="auth-shell">
<section class="auth-card narrow">
<h1 class="auth-heading">Choose a new password</h1>
<form class="auth-form" id="passwordForm">
<div class="field full">
<label for="password">New password</label><input id="password" minlength="8" name="password" required="" type="password"/>
</div>
<div class="field full">
<label for="confirmPassword">Confirm new password</label>
<input id="confirmPassword" minlength="8" name="confirmPassword" required="" type="password"/>
</div>
<div class="full"><p class="form-message" id="message"></p></div>
<button class="btn btn-primary full" type="submit">Update Password</button>
</form>
</section>
</div>
</main>
<div data-site-footer=""></div>
<script src="assets/components.js"></script>
<script>
      renderLayout("login");
    </script>
<script src="assets/supabase-config.js"></script>
<script src="assets/vendor/supabase.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/pages/update-password.js"></script>
</body>
</html>
