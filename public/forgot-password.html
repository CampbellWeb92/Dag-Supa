<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1" name="viewport" />
    <title>Reset Password | Dag</title>
    <link href="assets/styles.css" rel="stylesheet" />
    <link href="assets/auth.css" rel="stylesheet" />
  </head>
  <body>
    <div data-site-header=""></div>
    <main>
      <section class="page-banner">
        <div class="container">
          <h1>Reset Password</h1>
          <p>We will email you a secure password-reset link.</p>
        </div>
      </section>
      <div class="auth-shell">
        <section class="auth-card narrow">
          <form class="auth-form" id="resetForm">
            <div class="field full">
              <label for="email">Account email</label
              ><input id="email" name="email" required="" type="email" />
            </div>
            <div class="full"><p class="form-message" id="message"></p></div>
            <div class="form-actions full">
              <button class="btn btn-primary">Send Reset Link</button
              ><a class="btn btn-outline" href="login.html">Back to login</a>
            </div>
          </form>
        </section>
      </div>
    </main>
    <div data-site-footer=""></div>
    <script src="assets/components.js"></script>
    <script>
      renderLayout("login");
    </script>
    <script src="assets/supabase-config.js"></script>
    <script src="assets/pages/forgot-password.js" type="module"></script>
  </body>
</html>
